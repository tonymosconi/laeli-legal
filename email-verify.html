<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Email confirmed — Laeli</title>
<meta name="description" content="Your Laeli email has been confirmed. Return to the app to finish signing in.">
<style>
  :root {
    --bg: #fffaf4;
    --ink: #2a1d12;
    --accent: #e07a3c;
    --muted: #6c5a4c;
    --card: #ffffff;
    --border: #efe2d2;
    --success: #2e7d4f;
    --success-bg: #e6f3eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding: 0;
  }
  main {
    max-width: 440px;
    margin: 0 auto;
    padding: 96px 24px 64px;
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--success-bg);
    margin: 0 auto 24px;
  }
  .badge svg {
    width: 40px;
    height: 40px;
    color: var(--success);
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.4px;
    margin: 0 0 12px;
  }
  .lead {
    font-size: 17px;
    color: var(--muted);
    margin: 0 0 32px;
  }
  .return-link {
    display: inline-block;
    padding: 14px 28px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    border-radius: 999px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .return-link:hover {
    transform: translateY(-1px);
    opacity: 0.95;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 16px;
  }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Laeli</p>
  <div class="badge" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <h1>Email confirmed</h1>
  <p class="lead">Your account is verified. Return to the Laeli app to continue.</p>
  <a class="return-link" href="laeli://auth-callback">Open Laeli</a>
  <footer>
    Questions? <a href="mailto:support@laeli.app">support@laeli.app</a>
  </footer>
</main>
</body>
</html>
