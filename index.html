<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laeli — Legal</title>
<meta name="description" content="Laeli legal documents: Privacy Policy and Terms of Service.">
<style>
  :root {
    --bg: #fffaf4;
    --ink: #2a1d12;
    --accent: #e07a3c;
    --muted: #6c5a4c;
    --card: #ffffff;
    --border: #efe2d2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding: 0;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 64px;
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.4px;
    margin: 0 0 8px;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 24px;
  }
  .nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 32px;
  }
  .nav a {
    display: block;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .nav a:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .nav .meta {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 4px;
  }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Laeli</p>
  <h1>Legal documents</h1>
  <p>Privacy and terms for the Laeli dog training coaching app.</p>
  <nav class="nav">
    <a href="/privacy">
      Privacy Policy
      <span class="meta">What we collect, how we use OpenAI, your rights.</span>
    </a>
    <a href="/terms">
      Terms of Service
      <span class="meta">Subscription terms, AI coaching limits, acceptable use.</span>
    </a>
  </nav>
  <footer>
    Questions? <a href="mailto:support@laeli.app">support@laeli.app</a>
  </footer>
</main>
</body>
</html>
